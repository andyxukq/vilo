  <template shadowrootmode="open">
    <style>
      :host {
        display: block;
        position: relative;
        z-index: 9999;
        --backdrop-alpha: 0.8;
        --backdrop-blur: 5px;
        --modal-height-mobile: 80svh;
        --modal-height-desktop: 100dvh;
        --modal-hide-y: calc(100svh + env(safe-area-inset-bottom, 0px) + 24px);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(168, 176, 183, 0);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        z-index: 9998;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s;
        pointer-events: none;
      }

      :host([open]) .overlay {
        visibility: visible;
        background-color: rgba(168, 176, 183, var(--backdrop-alpha));
        backdrop-filter: blur(var(--backdrop-blur));
        -webkit-backdrop-filter: blur(var(--backdrop-blur));
        pointer-events: auto;
      }

      .body {
        padding-inline: 1.8rem;
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .modal {
        position: fixed;
        background: #D3DAE2;
        z-index: 9999;
        will-change: transform;
        box-shadow: 0 0 3rem rgba(0, 0, 0, 0.15);
        pointer-events: auto;
        transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
        display: flex;
        flex-direction: column;
      }

      .close-icon {
        display: none;
        cursor: pointer;
        color: var(--text-color-secondary);
        background-color: transparent;
        border: none;
        height: 1.9rem;
        width: 1.9rem;
        padding: 0;
        justify-content: center;
        align-items: center;
      }

      .header {
        height: 4rem;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        touch-action: none;
      }

      .handle {
        width: 6rem;
        height: .6rem;
        background: #F1FAFE;
        border-radius: .6rem;
      }

      @media (max-width: 767px) {
        .modal {
          bottom: 0;
          left: 0;
          width: 100%;
          height: var(--modal-height-mobile);
          border-radius: 3rem 3rem 0 0;
          transform: translateY(var(--modal-hide-y));
        }

        :host([open]) .modal {
          transform: translateY(0);
        }
      }

      @media (min-width: 768px) {
        .modal {
          top: 0;
          right: 0;
          width: 50rem;
          height: var(--modal-height-desktop);
          transform: translateX(100%);
        }

        :host([open]) .modal {
          transform: translateX(0);
        }

        .header {
          height: 8rem;
          justify-content: end;
          padding-inline: 4rem;
        }

        .handle {
          display: none;
        }

        .close-icon {
          display: flex;
        }

        .body {
          padding-inline: 5rem;
        }
      }
      @media (min-width: 1600px) {
        .modal {
          width: 60rem;
        }
      }
    </style>
