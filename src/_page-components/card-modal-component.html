<card-modal id="staffModal">
  <template shadowrootmode="open">
    <style>
      :host {
        display: block;
        position: relative;
        z-index: 9999;
        --backdrop-alpha: 0.8;
        --backdrop-blur: 5px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(168, 176, 183, 0);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        z-index: 9998;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s;
        pointer-events: none;
      }

      :host([open]) .overlay {
        visibility: visible;
        background-color: rgba(168, 176, 183, var(--backdrop-alpha));
        backdrop-filter: blur(var(--backdrop-blur));
        -webkit-backdrop-filter: blur(var(--backdrop-blur));
        pointer-events: auto;
      }

      .body {
        padding-inline: 1.8rem;
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .modal {
        position: fixed;
        background: #D3DAE2;
        z-index: 9999;
        will-change: transform;
        box-shadow: 0 0 3rem rgba(0, 0, 0, 0.15);
        pointer-events: auto;
        transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
        display: flex;
        flex-direction: column;
      }

      .close-icon {
        display: none;
        cursor: pointer;
        color: var(--text-color-secondary);
        background-color: transparent;
        border: none;
        height: 1.9rem;
        width: 1.9rem;
        padding: 0;
        justify-content: center;
        align-items: center;
      }

      .header {
        height: 4rem;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        touch-action: none;
      }

      .modal-card-image-wrapper {
        width: 100%;
        flex-shrink: 0;
        aspect-ratio: 38 / 30;
        border-radius: 3rem;
        overflow: hidden;
      }

      .modal-card-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
      }

      .modal-card-content-wrapper {
        padding-block: 3rem;
        gap: 3rem;
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .modal-card-name {
        font-size: 3rem;
        line-height: 3.2rem;
        color: var(--primary-color);
        margin: 0;
      }

      .modal-card-content-row-1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-card-content-row-2 {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .modal-card-social-links {
        color: var(--text-color-secondary);
        display: flex;
        gap: 1rem;
      }

      .modal-card-social-link {
        color: var(--text-color-secondary);
        border: 1px solid;
        display: flex;
        padding: .4rem;
        border-radius: .25rem;
      }

      .modal-card-social-link svg {
        size: 1.4rem;
      }

      .modal-card-role {
        flex: 0 0 10rem;
        margin: 0;
        color: var(--primary-color);
        font-size: 2rem;
        line-height: 3.2rem;
      }

      .modal-card-description {
        flex-grow: 1;
        font-size: 1.4rem;
        line-height: 2rem;
        color: var(--text-color-secondary);
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-right: 0.5rem;
        overscroll-behavior: contain;
      }

      .modal-card-description p {
        margin: 0;
      }

      @media (max-width: 767px) {
        .modal {
          bottom: 0;
          left: 0;
          width: 100%;
          height: 80svh;
          border-radius: 3rem 3rem 0 0;
          transform: translateY(100%);
        }

        :host([open]) .modal {
          transform: translateY(0);
        }
      }

      @media (min-width: 768px) {
        .modal {
          top: 0;
          right: 0;
          width: 60rem;
          height: 100dvh;
          transform: translateX(100%);
        }

        :host([open]) .modal {
          transform: translateX(0);
        }

        .header {
          height: 8rem;
          justify-content: end;
          padding-inline: 4rem;
        }

        .handle {
          display: none;
        }

        .close-icon {
          display: flex;
        }

        .modal-card-image-wrapper {
          aspect-ratio: 1 / 1;
        }

        .modal-card-image {
          object-position: center;
        }

        .body {
          padding-inline: 5rem;
        }

        .modal-card-social-link {
          padding: .65rem;
        }

        .modal-card-name {
          font-size: 4.8rem;
        }

        .modal-card-social-link svg {
          size: 1.7rem;
        }

        .modal-card-description {
          font-size: 1.8rem;
          line-height: 2.6rem;
        }
      }

      .handle {
        width: 6rem;
        height: .6rem;
        background: #F1FAFE;
        border-radius: .6rem;
      }
    </style>

      </div>
    </div>
  </template>
</card-modal>
