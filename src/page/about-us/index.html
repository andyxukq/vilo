      <card-modal id="staffModal">
        <template shadowrootmode="open">
          <style>
            :host {
              display: block;
              position: relative;
              z-index: 9999;
              --backdrop-alpha: 0.8;
              --backdrop-blur: 5px;
            }

            .overlay {
              position: fixed;
              inset: 0;
              background-color: rgba(168, 176, 183, 0);
              backdrop-filter: blur(0px);
              -webkit-backdrop-filter: blur(0px);
              z-index: 9998;
              visibility: hidden;
              transition: opacity 0.3s ease, visibility 0.3s;
              pointer-events: none;
            }

            :host([open]) .overlay {
              visibility: visible;
              background-color: rgba(168, 176, 183, var(--backdrop-alpha));
              backdrop-filter: blur(var(--backdrop-blur));
              -webkit-backdrop-filter: blur(var(--backdrop-blur));
              pointer-events: auto;
            }

            .body {
              padding-inline: 1.8rem;
            }

            .modal {
              position: fixed;
              background: #D3DAE2;
              z-index: 9999;
              will-change: transform;
              box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
              pointer-events: auto;
              transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1);
            }

            .close-icon {
              display: none;
              cursor: pointer;
              color: var(--text-color-secondary);
              background-color: transparent;
              border: none;
              height: 1.9rem;
              width: 1.9rem;
              padding: 0;
              justify-content: center;
              align-items: center;
            }

            .header {
              height: 4rem;
              display: flex;
              justify-content: center;
              align-items: center;
              touch-action: none;
            }

            .modal-card-image-wrapper {
              width: 100%;
              aspect-ratio: 38 / 30;
              border-radius: 3rem;
              overflow: hidden;
            }

            .modal-card-image {
              width: 100%;
              height: 100%;
              object-fit: cover;
              object-position: top;
            }

            @media (max-width: 767px) {
              .modal {
                bottom: 0;
                left: 0;
                width: 100%;
                height: 80svh;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
              }

              :host([open]) .modal {
                transform: translateY(0);
              }
            }

            @media (min-width: 768px) {
              .modal {
                top: 0;
                right: 0;
                width: 450px;
                height: 100dvh;
                transform: translateX(100%);
              }

              :host([open]) .modal {
                transform: translateX(0);
              }

              .header {
                height: 8rem;
                justify-content: end;
                padding-inline: 4rem;
              }

              .handle {
                display: none;
              }

              .close-icon {
                display: flex;
              }

              .modal-card-image-wrapper {
                aspect-ratio: 1 / 1;
              }

              .modal-card-image {
                object-position: center;
              }

              .body {
                padding-inline: 5rem;
              }
            }

            .handle {
              width: 6rem;
              height: .6rem;
              background: #F1FAFE;
              border-radius: .6rem;
            }
          </style>
          <div class="overlay"></div>
          <div class="modal">
            <div class="header">
              <div class="handle"></div>
              <button type="button" class="close-icon js-close-modal-dialog" aria-label="Close modal">
                <svg width="16px" height="16px" viewBox="0 0 16 16" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                    <title>Close</title>
                    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                        <g transform="translate(-376, -426)" fill="currentColor" fill-rule="nonzero">
                            <path d="M390.618319,426.32494 C390.98835,425.954908 391.52488,425.891497 391.816692,426.183308 C392.108503,426.47512 392.045092,427.01165 391.67506,427.381681 L385.057,434 L391.67506,440.618319 C392.045092,440.98835 392.108503,441.52488 391.816692,441.816692 C391.52488,442.108503 390.98835,442.045092 390.618319,441.67506 L384,435.057 L377.381681,441.67506 C377.042486,442.014256 376.563385,442.095805 376.261122,441.882272 L376.183308,441.816692 C375.891497,441.52488 375.954908,440.98835 376.32494,440.618319 L382.943,434 L376.32494,427.381681 C375.954908,427.01165 375.891497,426.47512 376.183308,426.183308 C376.47512,425.891497 377.01165,425.954908 377.381681,426.32494 L384,432.943 Z"></path>
                        </g>
