      <div class="brand-page-hero-body">
        <div class="brand-page-hero-content">
          <h1 class="brand-page-headline">
            <span class="rastano-font">Almost here,</span>
            <span>just not quite yet</span>
          </h1>
          <p class="brand-page-body-text">
            Unfortunately, our site isn’t available in your region at this time.
            We’re working to make it accessible soon.
          </p>
        </div>
      </div>
    </section>

    <section class="brand-page-contact-us">
      <picture class="brand-page-contact-us-picture">
        <source
          media="(max-width: 767px)"
          srcset="/images/pages/brand-page/vilo-contact-form-images-grid-mobile.webp"
          type="image/webp">
        <img
          class="brand-page-contact-us-bg"
          src="/images/pages/brand-page/vilo-contact-form-images-grid-desktop.webp"
          alt=""
          decoding="async"
          loading="lazy">
      </picture>
      <div class="contact-us-wrapper brand-page-contact-us-overlay">
        <div class="contact-us-content">
          <h2 class="title">Join <span class="rastano-font">the Journey</span></h2>
          <p>
            Want first access? Leave your email and be notified as soon as we launch in your region.
          </p>
        </div>
        <div class="contact-us-form js-contact-us-form">
          <form method="post">
            <div class="error-tooltip" aria-live="polite">
              Please enter a valid email address
            </div>
            <input type="email" id="email" autocomplete="email" name="email" required placeholder="Enter your email address">
            <textarea id="message" autocomplete="on" name="message" rows="4" placeholder="Share your thoughts, shape what we build, and help Vilo grow with you. In return, we’ll offer our earliest supporters the best access, care, and pricing—always."></textarea>
            <button type="submit" class="btn-with-animation" variant="primary" data-fb-event="SubmitApplication">
              Preorder Now
              <load ="/_page-components/animation-icon-arrow.html" />
            </button>
          </form>
        </div>
      </div>
    </section>
